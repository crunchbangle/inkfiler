name: Build artifacts

# After a PR merges to main, build Windows + Linux installers and publish them
# to a GitHub Release so they have stable, linkable download URLs.
on:
  push:
    branches: [main]

permissions:
  contents: write # needed to create the release and upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
          - os: windows-latest
            label: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install Tauri Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend deps
        working-directory: app
        run: npm ci

      # Builds the app and uploads the bundles (.msi/.exe on Windows,
      # .deb/.AppImage on Linux) to one release shared by both matrix jobs.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          tagName: build-${{ github.run_number }}
          releaseName: "InkFiler build #${{ github.run_number }}"
          releaseBody: |
            Automated build from the latest commit on `main`.
            ⚠️ Unsigned — Windows SmartScreen / Linux may warn on first run.
          releaseDraft: false
          prerelease: false
